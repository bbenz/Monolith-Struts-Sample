apiVersion: apps/v1
kind: Deployment
metadata:
  name: skishop-app
  namespace: dukes-ski-chalet
  labels:
    app: dukes-ski-chalet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dukes-ski-chalet
  template:
    metadata:
      labels:
        app: dukes-ski-chalet
    spec:
      containers:
        - name: skishop-app
          image: PLACEHOLDER_IMAGE
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: skishop-config
            - secretRef:
                name: skishop-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
